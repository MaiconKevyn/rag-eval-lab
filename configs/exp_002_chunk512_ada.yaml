experiment_id: "exp_002_chunk512_ada"
description: "Larger chunks — chunk_size=512, text-embedding-3-small, top_k=5"
corpus: "data/corpus/agentic_ai_landscape.pdf"

chunking:
  chunk_size: 512
  chunk_overlap: 64
  separators: ["\n\n", "\n", ". ", " "]

embedding:
  provider: "openai"
  model: "text-embedding-3-small"
  batch_size: 100

retrieval:
  top_k: 5
  score_threshold: 0.70

generation:
  provider: "openai"
  model: "gpt-4o-mini"
  temperature: 0.0
  max_tokens: 512
  system_prompt: |
    Você é um assistente que responde perguntas usando APENAS o contexto fornecido.
    Se o contexto for insuficiente, diga "Não há informação suficiente no contexto."
